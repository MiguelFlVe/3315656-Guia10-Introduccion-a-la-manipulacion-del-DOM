<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas por Usuario</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">
        <header class="page__header header">
            <div class="header__content">
                <h1 class="header__title">Gestión de Tareas</h1>
                <p class="header__subtitle"><b>USUARIOS</b></p>
            </div>
        </header>

        <main class="page__main main-content">
            <section class="user-search user-search--panel">
                <div class="user-search__card card">
                    <h2 class="card__title">ID Usuario</h2>
                    <form id="userSearchForm" class="user-search__form form" novalidate>
                        <div class="form__group form__group--inline">
                            <label for="userDocument" class="form__label">Documento del usuario</label>
                            <input
                                type="text"
                                id="userDocument"
                                class="form__input"
                                name="userDocument"
                                placeholder="Ingrese el documento"
                                aria-required="true"
                                autocomplete="off"
                            >
                            <span class="form__error" id="userDocumentError" aria-live="polite"></span>
                        </div>

                        <div class="user-search__actions">
                            <button type="submit" class="btn btn--primary">Buscar usuario</button>
                        </div>
                    </form>

                    <div class="user-search__result user-card hidden" id="userCard" aria-live="polite">
                        <h3 class="user-card__title">Usuario encontrado</h3>
                        <p class="user-card__item"><strong>Nombre:</strong> <span id="userNameDisplay"></span></p>
                        <p class="user-card__item"><strong>Documento:</strong> <span id="userDocumentDisplay"></span></p>
                        <p class="user-card__item"><strong>Email:</strong> <span id="userEmailDisplay"></span></p>
                    </div>

                    <p class="user-search__message info-message hidden" id="userSearchMessage"></p>
                </div>
            </section>

            <section class="task-register task-register--panel">
                <div class="task-register__card card">
                    <h2 class="card__title">Registrar Tarea</h2>
                    <form id="taskForm" class="task-register__form form" novalidate>
                        <fieldset class="task-register__fieldset" id="taskFormFieldset" disabled>
                            <div class="form__group">
                                <label for="taskTitle" class="form__label">Título de la tarea</label>
                                <input
                                    type="text"
                                    id="taskTitle"
                                    class="form__input"
                                    name="taskTitle"
                                    placeholder="Escribe el título"
                                    aria-required="true"
                                >
                                <span class="form__error" id="taskTitleError" aria-live="polite"></span>
                            </div>

                            <div class="form__group">
                                <label for="taskDescription" class="form__label">Descripción</label>
                                <textarea
                                    id="taskDescription"
                                    class="form__input form__textarea"
                                    name="taskDescription"
                                    rows="4"
                                    placeholder="Describe la tarea"
                                    aria-required="true"
                                ></textarea>
                                <span class="form__error" id="taskDescriptionError" aria-live="polite"></span>
                            </div>

                            <div class="form__group">
                                <label for="taskStatus" class="form__label">Estado de la tarea</label>
                                <select id="taskStatus" class="form__input" name="taskStatus" aria-required="true">
                                    <option value="">Selecciona un estado</option>
                                    <option value="pendiente">Pendiente</option>
                                    <option value="en-proceso">En proceso</option>
                                    <option value="completada">Completada</option>
                                </select>
<span class="form__error" id="taskStatusError" aria-live="polite"></span>
                            </div>

                            <div class="task-register__actions">
                                <button type="button" class="btn btn--primary" id="submitTaskBtn">Registrar tarea</button>
                            </div>
                        </fieldset>
                    </form>
                </div>
            </section>

            <section class="tasks tasks--panel">
                <div class="tasks__card card">
                    <div class="tasks__header">
                        <h2 class="card__title">Tareas registradas</h2>
                        <p class="tasks__subtitle">Las tareas aparecen aquí una debajo de otra</p>
                    </div>

                    <div class="tasks__table-wrapper">
                        <table class="tasks__table" aria-label="Lista de tareas">
                            <thead class="tasks__head">
                                <tr>
                                    <th class="tasks__column">Título</th>
                                    <th class="tasks__column">Descripción</th>
                                    <th class="tasks__column">Estado</th>
                                    <th class="tasks__column">Usuario</th>
                                </tr>
                            </thead>
                            <tbody id="tasksTableBody" class="tasks__body"></tbody>
                        </table>

                        <div class="tasks__empty" id="tasksEmptyState">
                            <p>Aún no hay tareas registradas.</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="page__footer footer">
            <p class="footer__text">Módulo básico de gestión de tareas | Ejercicio DOM</p>
        </footer>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
